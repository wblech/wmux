name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          args: --timeout=5m

      - name: Install goframe
        run: go install github.com/wblech/goframe/cmd/goframe@latest

      - name: Run goframe check
        run: goframe check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Run tests
        run: go test -race -shuffle=on ./...
