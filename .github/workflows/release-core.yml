name: "Release: wmux"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - beta
          - patch
          - minor
          - major

jobs:
  release:
    uses: ./.github/workflows/release-module.yml
    with:
      bump: ${{ inputs.bump }}
      tag-prefix: ""
      tag-glob: "v[0-9]*"
      cliff-config: "cliff.toml"
      changelog-path: "CHANGELOG.md"
      module-name: "wmux"
    secrets: inherit
    permissions:
      contents: write
