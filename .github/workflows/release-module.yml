name: Release Module

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: string
      tag-prefix:
        description: "Git tag prefix (empty for core, 'addons/charmvt/' for addon)"
        required: true
        type: string
      tag-glob:
        description: "Glob to find latest tag (e.g. 'v[0-9]*')"
        required: true
        type: string
      cliff-config:
        description: "Path to git-cliff config file"
        required: true
        type: string
      changelog-path:
        description: "Path to CHANGELOG.md file"
        required: true
        type: string
      module-name:
        description: "Display name for commit messages and release title"
        required: true
        type: string

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
          TAG_GLOB: ${{ inputs.tag-glob }}
        run: |
          LATEST=$(git tag -l "$TAG_GLOB" --sort=-v:refname | head -n1)
          NEXT=$(. .github/scripts/bump-version.sh "$LATEST" "$TAG_PREFIX" "$BUMP")
          TAG="${TAG_PREFIX}${NEXT}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing: $TAG"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: ${{ inputs.cliff-config }}
          args: --tag "${{ steps.version.outputs.tag }}"
        env:
          OUTPUT: ${{ inputs.changelog-path }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release notes
        id: notes
        uses: orhun/git-cliff-action@v4
        with:
          config: ${{ inputs.cliff-config }}
          args: --tag "${{ steps.version.outputs.tag }}" --unreleased --strip header
        env:
          OUTPUT: /tmp/release-notes.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        run: |
          git add "${{ inputs.changelog-path }}"
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"

      - name: Push
        run: |
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ inputs.module-name }} ${{ steps.version.outputs.version }}"
          body_path: /tmp/release-notes.md
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
