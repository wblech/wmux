name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - beta
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -n1)

          if [ -z "$LATEST" ]; then
            # No tags yet — first release
            if [ "$BUMP" = "beta" ]; then
              NEXT="v0.1.0-beta.1"
            else
              NEXT="v0.1.0"
            fi
          else
            # Strip leading v
            V="${LATEST#v}"

            # Check if current version is a beta
            if echo "$V" | grep -q "beta"; then
              BASE=$(echo "$V" | sed 's/-beta\..*//')
              BETA_NUM=$(echo "$V" | sed 's/.*-beta\.//')

              case "$BUMP" in
                beta)
                  NEXT="v${BASE}-beta.$((BETA_NUM + 1))"
                  ;;
                patch)
                  NEXT="v${BASE}"
                  ;;
                minor)
                  # Increment minor from base
                  MAJOR=$(echo "$BASE" | cut -d. -f1)
                  MINOR=$(echo "$BASE" | cut -d. -f2)
                  NEXT="v${MAJOR}.$((MINOR + 1)).0"
                  ;;
                major)
                  MAJOR=$(echo "$BASE" | cut -d. -f1)
                  NEXT="v$((MAJOR + 1)).0.0"
                  ;;
              esac
            else
              # Stable version
              MAJOR=$(echo "$V" | cut -d. -f1)
              MINOR=$(echo "$V" | cut -d. -f2)
              PATCH=$(echo "$V" | cut -d. -f3)

              case "$BUMP" in
                beta)
                  NEXT="v${MAJOR}.$((MINOR + 1)).0-beta.1"
                  ;;
                patch)
                  NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
                  ;;
                minor)
                  NEXT="v${MAJOR}.$((MINOR + 1)).0"
                  ;;
                major)
                  NEXT="v$((MAJOR + 1)).0.0"
                  ;;
              esac
            fi
          fi

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Releasing: $NEXT"

      - name: Generate changelog
        run: |
          git-cliff --config cliff.toml --tag "${{ steps.version.outputs.version }}" --output CHANGELOG.md

      - name: Extract release notes
        id: notes
        run: |
          # Extract only the section for this version
          git-cliff --config cliff.toml --tag "${{ steps.version.outputs.version }}" --unreleased --strip header > /tmp/release-notes.md
          echo "path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Commit changelog
        run: |
          git add CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.version }}"

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.version }}"

      - name: Push
        run: |
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.md
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
