# cliff-charmvt.toml — git-cliff configuration for addons/charmvt
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to the charmvt addon are documented in this file.\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="addons/charmvt/v") }}]{% if commit_id %}(https://github.com/wblech/wmux/releases/tag/{{ version }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
          {% if commit.scope %} *({{ commit.scope }})*{% endif %}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "addons/charmvt/v[0-9].*"
sort_commits = "oldest"

commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^perf", group = "Performance" },
    { message = "^test", group = "Testing" },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
]
